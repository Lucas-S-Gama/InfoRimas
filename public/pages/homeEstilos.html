<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRimas | Home | Estilos</title>
    <link rel="shortcut icon" href="../assets/icon/LogoInfoRimasVermelha.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/homeEstilos.css">
    <link rel="stylesheet" href="../css/footer.css">

    <script src="../js/sessao.js"></script>
</head>
<body onload="CarregarEstilos(), validarSessao()">
    <header class="Header">
        <div class="header_esquerda">
            <img src="../assets/icon/LogoPreto.png" alt="LogoPreta">
            <p>Info<span>Rimas</span></p>
        </div>
        <div class="header_direita">
            <a href="homeTecnicas.html">Home</a>
            <a href="Treino.html">Treino</a>
            <a href="rank.html">Rank</a>
            <a onclick="limparSessao()">Sair</a>
        </div>
    </header>
    <nav class="barraNavegacao">
        <a href="./homeTecnicas.html">Técnicas</a>
        <a href="./homeDicionario.html">Dicionario do Rap</a>
        <a href="./homeEstilos.html">Estilos de rima</a>
    </nav>
    <div id="div_aguardar" style="width: 250px; display: none; justify-self: center;">
        <img src="../assets/loader-bola.gif" id="loading-gif" style="width: 100%;"/>
    </div>
    <section class="SecaoEstilos" id="LayoutBoxs">

    </section>

    <footer class="Footer">
        <img src="../assets/icon/LogoBranca.png" alt="LogoVermelha">
        <div class="FooterContatos">
            <h1>Contatos</h1>
            <p>Telefone: (xx) - XXXXX-XXXX</p>
            <p>Email: email@example.com</p>
        </div>
        <div class="FooterPaginas">
            <h1>Páginas</h1>
            <div class="FooterPaginasLinks">
                <ul>
                    <li><a href="homeTecnicas.html">Home</a></li>
                    <li><a onclick="limparSessao()">Login</a></li>
                </ul>
                <ul>
                    <li><a href="Treino.html">Treino</a></li>
                    <li><a href="Rank.html">Rank</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
    <script>

        async function CarregarEstilos() {
            aguardar();

            await fetch('/estilos/CaptarEstilos').then(function (resposta) {
                if(resposta.ok) {
                    resposta.json().then(function (resposta) {

                        for (let i = 0; i < resposta.length; i++) {

                            if (i % 2 == 0) {
                            LayoutBoxs.innerHTML += `
                            <div class="Box">
                                <div class="BoxEsquerda">
                                    <p class="titulo">${resposta[i].nome}</p>
                                    <p class="descricao">${resposta[i].descricao}</p>
                                </div>
                                <div class="BoxDireita">
                                    <iframe width="100%" height="100%" src="${resposta[i].url}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                                </div>
                            </div>
                            `
                            } else {
                            LayoutBoxs.innerHTML += `
                            <div class="Box BoxInvertida">
                                <div class="BoxEsquerda">
                                    <p class="titulo">${resposta[i].nome}</p>
                                    <p class="descricao">${resposta[i].descricao}</p>
                                </div>
                                <div class="BoxDireita">
                                    <iframe width="100%" height="100%" src="${resposta[i].url}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                                </div>
                            </div>
                            `
                            }
                        }

                    })
                }
            })
            finalizarAguardar();
        }
    </script>
</html>
