    <script>

        async function CarregarTermos() {
            await fetch('/termos/CaptarTermos').then(function (resposta) {
                if(resposta.ok) {
                    resposta.json().then(function (resposta) {

                        let nome = resposta[0].nome
                        let PorcentagemDeUso = resposta[0].PorcentagemDeUso;

                        for (let i = 0; i < resposta.length; i++) {
                            LayoutBoxs.innerHTML += `
                            <div class="Box">
                                <div class="BoxFrente">
                                    <p>${resposta[i].nome}</p>
                                </div>
                                <div class="BoxAtras">
                                    <p>${resposta[i].descricao}</p>
                                </div>
                            </div>
                            `
                        }

                    })
                }
            })
        }
