<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoRimas</title>
    <link rel="shortcut icon" href="/public/assets/icon/LogoInfoRimasVermelha.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/LoginCadastro.css">
    <link rel="stylesheet" href="../css/footer.css">
</head>
<body>
    <header class="Header">
        <div class="header_esquerda">
            <img src="../assets/icon/LogoInfoRimasPreta.png" alt="LogoPreta">
            <p>Info<span>Rimas</span></p>
        </div>
        <div class="header_direita">
            <a href="../index.html">Inicio</a>
            <a href="cadastro.html">Cadastro</a>
            <a href="login.html">Login</a>
            <a href="sobrenos.html">Sobre nós</a>
        </div>
    </header>
    <div class="banner">
        <div class="box">
            <h1>LOGIN</h1>
            <div class="box-inputs">
                <div class="campo">
                    <span>EMAIL:</span>
                    <input id="ipt_email" type="text" placeholder="exemplo@email.com">
                </div>
                <div class="campo">
                    <span>SENHA:</span>
                    <input id="ipt_senha" type="password" placeholder="*******">
                    <img id="MicSenha" onclick="MostrarSenha()" src="../assets/imgs/microfone-mudo.png" alt="microfone-mudo">
                </div>
            </div>
            <button onclick="logar()">LOGAR</button>
            <br>
            <a href="#">Esqueci a senha</a>
            <a href="/public/pages/cadastro.html">Não tenho conta cadastrada</a>
        </div>
    </div>
    <footer class="Footer">
        <img src="../assets/icon/LogoInfoRimasVermelha.png" alt="LogoVermelha">
        <div class="FooterContatos">
            <h1>Contatos</h1>
            <p>Telefone: (xx) - XXXXX-XXXX</p>
            <p>Email: email@example.com</p>
        </div>
        <div class="FooterPaginas">
            <h1>Páginas</h1>
            <div class="FooterPaginasLinks">
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
                <ul>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="sobrenos.html">Sobre nós</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
    <script src="../js/ExibirSenha.js"></script>
    <script>
        function logar() {
            let emailLet = ipt_email.value
            let senhaLet = ipt_senha.value

            if (emailLet == '' || senhaLet == '') {
                alert('Preencha todos os campos');
                    return false;
            } else if (!emailLet.includes('@') || !emailLet.includes('.')) {
                alert('Digite um email válido');
                    return false;
            }


            fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailLet,
                senhaServer: senhaLet
            })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;
                        
                        console.log("Estou aqui Deus?")
                        setTimeout(function () {
                            window.location = "../index.html";
                        }, 1000); // apenas para exibir o loading

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })

            return false;
        }
    </script>
</html>
